version: v2
plugins:
  - local: protoc-gen-es
    out: packages/proto/src/gen
    include_imports: true
    opt:
      - target=ts
      - import_extension=none
  - local: protoc-gen-connect-es
    out: packages/proto/src/gen
    include_imports: true
    opt:
      - target=ts
      - import_extension=none
